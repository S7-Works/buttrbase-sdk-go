name: Create GitHub Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
      - run: |
          # Warm the Go module proxy so `go get` finds the new version
          # immediately rather than waiting for the proxy's polling cycle.
          curl -sfI "https://proxy.golang.org/github.com/buttrbase/buttrbase-go/@v/$GITHUB_REF_NAME.info" || true
